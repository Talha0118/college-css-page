<!DOCTYPE html>
<html>
<head>
    <title >College Selection Form</title>
    <style>
    body{ 
    background-image: url("jtm.jpg");
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    height: 100vh;
    margin: 0;
}
input[type="submit"]{
    background: rgb(45, 201, 68);
    color: white;
}

input[type="reset"]{
    background: rgb(201, 42, 42);
    color: white;
}
 table
    { background: hsl(190, 18%, 87%); }


 

</style>
</head>

<body >
 
<div align="center">

    <h2 style="color: black;">College Selection Form</h2>

    <form >

        <table id="12"  border="1" cellpadding="10">

            <tr>
    <td><label>Student Name</label></td>
         <td><input type="text" placeholder="Enter Your Name" required></td>
            </tr>

            <tr>
          <td><label>Student Email</label></td>
         <td ><input type="email" placeholder="Enter Your Email" required></td>
            </tr>

            <tr>
                <td><label>Date of Birth</label></td>
                <td><input type="date" required></td>
            </tr>

            <tr>
                <td><label>Gender</label></td>
                <td>
                    <input type="radio" name="gender"> Male
                    <input type="radio" name="gender"> Female
                    <input type="radio" name="gender"> Other
                </td>
            </tr>

            <tr>
                <td><label>Select Technology</label></td>
                <td>
                    <input type="checkbox"> Data Analytics<br>
                    <input type="checkbox"> Data Science<br>
                    <input type="checkbox"> Machine Learning<br>
                    <input type="checkbox"> Python<br>
                    <input type="checkbox"> Java<br>
                    <input type="checkbox"> HTML
                </td>
            </tr>

            <tr>
                <td><label>Select District</label></td>
                <td>
                    <select>
                        <option>--Select District--</option>
                        <option>Pune</option>
                        <option>Mumbai</option>
                        <option>Hyderabad</option>
                        <option>Nagpur</option>
                        <option>Nashik</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td><label>Address</label></td>
                <td>
                    <textarea rows="4" cols="25" placeholder="Enter Your Address"></textarea>
                </td>
            </tr>

            <tr>
                <td colspan="2" align="center" >
                    <input  type="submit" value="Submit" >
                    <input type="reset" value="Reset">
                </td>
            </tr>

        </table>

    </form>

</div>

</body>
</html>
